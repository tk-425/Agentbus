# GoReleaser v2 configuration for agentbus.
# Docs: https://goreleaser.com/customization/
# Validate locally: `goreleaser check`
# Dry run:          `goreleaser release --snapshot --clean`
version: 2

project_name: agentbus

before:
  hooks:
    - go mod tidy

builds:
  - id: agentbus
    main: .
    binary: agentbus
    env:
      # Pure-Go build: the SQLite driver is CGo-free, so cross-compilation needs
      # no per-platform C toolchain.
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      # The tag is the single source of truth for the released version; it is
      # linked into the injectable version surface at build time.
      - -s -w -X github.com/tk-425/agentbus/internal/version.String={{ .Version }}

archives:
  - id: agentbus
    ids:
      - agentbus
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  # Release notes are grouped by conventional-commit prefix, covering commits
  # since the previous tag.
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  # Distribution is limited to GitHub Releases. The release workflow only fires on
  # final `vX.Y.Z` tags, so no prerelease handling is configured here.
  draft: false
